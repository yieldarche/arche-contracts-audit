[profile.default]
src = "src"
out = "out"
libs = ["lib"]
script = "script"
test = "test"
solc = "0.8.18"
optimizer = true
optimizer_runs = 200
via_ir = false
evm_version = "cancun"

[profile.default.fuzz]
runs = 256

[rpc_endpoints]
mainnet = "${ETH_RPC_URL}"
mainnet_public = "https://ethereum-rpc.publicnode.com"

[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}" }
